<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Techunited - Plot Locator</title>
    <style>
        /* Color Mapping: Registry=Green, Booked=Yellow, Vacant=Red */
        :root { 
            --gold: #D4AF37; 
            --registry: #2ecc71; 
            --booked: #f1c40f;   
            --vacant: #e74c3c;   
            --edit: #3498db;     
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; text-align: center; color: #333; }
        
        /* Admin Bar */
        .admin-bar { text-align: right; padding-bottom: 10px; font-size: 0.8rem; }
        .admin-btn { background: none; border: 1px solid #ccc; cursor: pointer; padding: 4px 10px; border-radius: 4px; transition: 0.3s; }
        .admin-btn:hover { background: #eee; }
        .admin-status { color: var(--registry); font-weight: bold; }

        .header h1 { color: #2c3e50; font-size: 1.6rem; margin-bottom: 5px; }
        .header p { font-size: 0.85rem; color: #7f8c8d; margin-bottom: 20px; }

        /* Controls */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; }
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 600px; flex-wrap: wrap; }
        
        select, input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; width: 100%; max-width: 200px; outline: none; }
        .btn-search { background: var(--gold); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #search-area { display: none; }

        /* Map UI */
        .map-section { 
            display: none; margin: 0 auto; max-width: 1200px; 
            border: 3px solid var(--gold); border-radius: 12px; 
            position: relative; overflow: hidden; background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .container { position: relative; width: 100%; line-height: 0; }
        #map-image { width: 100%; height: auto; display: block; }
        
        #svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        polygon { pointer-events: auto; transition: fill 0.2s, stroke 0.2s; cursor: pointer; }

        /* Tooltip */
        #tooltip { 
            position: fixed; display: none; background: white; padding: 15px; 
            border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); 
            z-index: 10000; width: 260px; text-align: left; border-top: 6px solid var(--gold); 
        }
        @media (max-width: 600px) { #tooltip { width: 85%; left: 7.5% !important; top: 10% !important; } }
        
        .t-label { font-size: 0.65rem; color: #95a5a6; text-transform: uppercase; font-weight: bold; display: block; margin-top: 8px; }
        .t-value { font-size: 0.95rem; color: #2c3e50; font-weight: 600; display: block; }
        
        .edit-input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
        .btn-close { background: #f1f1f1; border: none; padding: 5px 10px; border-radius: 4px; float: right; cursor: pointer; }

        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 0.8rem; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="admin-bar">
        {% if is_admin %}
            <span class="admin-status">● Admin Mode</span> | <a href="/logout" style="color:red; text-decoration:none;">Logout</a>
        {% else %}
            <button class="admin-btn" onclick="showLoginPrompt()">Admin Login</button>
        {% endif %}
    </div>

    <div class="header">
        <h1>Techunited Plot Locator</h1>
        <p>Interactive Map & Inventory Tracker</p>
    </div>

    <div class="controls">
        <div class="row">
            <select id="city-select" onchange="updateProjects()">
                <option value="">Select City</option>
                {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
            </select>
            <select id="project-select" onchange="loadMap()" disabled></select>
        </div>
        <div class="row" id="search-area">
            <input type="text" id="plot-search" placeholder="Enter Plot ID (e.g. 1)">
            <button class="btn-search" onclick="searchPlot()">Find Plot</button>
        </div>
    </div>

    <div id="map-area" class="map-section">
        <div class="container">
            <img id="map-image" src="">
            <svg id="svg-overlay"></svg>
        </div>
    </div>

    <div class="legend" id="map-legend" style="display:none;">
        <div class="legend-item"><div class="dot" style="background:var(--registry)"></div> Registry done</div>
        <div class="legend-item"><div class="dot" style="background:var(--booked)"></div> Booked</div>
        <div class="legend-item"><div class="dot" style="background:var(--vacant)"></div> Vacant</div>
    </div>

    <div id="tooltip">
        <button class="btn-close" onclick="closeTooltip()">✕</button>
        <div id="tooltip-content"></div>
    </div>

    <script>
        // Wrapped in quotes to prevent VS Code "Red" errors
        const IS_ADMIN = "{{ 'true' if is_admin else 'false' }}" === "true";
        
        const citySel = document.getElementById('city-select'), projSel = document.getElementById('project-select');
        const searchArea = document.getElementById('search-area'), mapArea = document.getElementById('map-area');
        const mapImg = document.getElementById('map-image'), svgOverlay = document.getElementById('svg-overlay');
        const tooltip = document.getElementById('tooltip');
        
        let isLocked = false, currentPlotData = null, activePoly = null, lastFetchedPlots = [], touchTimer, searchTimer;

        function showLoginPrompt() {
            const user = prompt("Admin Username:");
            const pass = prompt("Admin Password:");
            if (user && pass) {
                fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                }).then(res => res.json()).then(data => {
                    if(data.success) location.reload();
                    else alert("Access Denied");
                });
            }
        }

        function updateProjects() {
            const city = citySel.value;
            projSel.innerHTML = '<option value="">Select Project</option>';
            mapArea.style.display = 'none'; searchArea.style.display = 'none';
            document.getElementById('map-legend').style.display = 'none';
            if (!city) { projSel.disabled = true; return; }
            fetch(`/get_projects?city=${city}`).then(res => res.json()).then(projects => {
                projects.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p; opt.innerHTML = p.replace(/_/g, ' ').toUpperCase();
                    projSel.appendChild(opt);
                });
                projSel.disabled = false;
            });
        }

        function loadMap() {
            const city = citySel.value, project = projSel.value;
            if (!project) return;
            mapImg.src = `/static/${city}/${project}/map.png`;
            mapArea.style.display = 'block';
            fetch(`/get_all_plots?city=${city}&project=${project}`).then(res => res.json()).then(plots => {
                lastFetchedPlots = plots;
                searchArea.style.display = 'flex';
                document.getElementById('map-legend').style.display = 'flex';
                mapImg.onload = () => renderPlots(plots);
                if (mapImg.complete) mapImg.onload();
            });
        }

        function highlightPolygon(poly, status) {
            if (activePoly) resetPolygon(activePoly);
            activePoly = poly;
            const s = status.trim().toLowerCase();
            let fill, stroke;

            if (s === 'editing') {
                fill = "rgba(52, 152, 219, 0.4)"; stroke = "var(--edit)";
            } else if (s === 'registry done') {
                fill = "rgba(46, 204, 113, 0.4)"; stroke = "var(--registry)";
            } else if (s === 'booked') {
                fill = "rgba(241, 196, 15, 0.4)"; stroke = "var(--booked)";
            } else {
                fill = "rgba(231, 76, 60, 0.4)"; stroke = "var(--vacant)";
            }

            poly.setAttribute("fill", fill);
            poly.setAttribute("stroke", stroke);
            poly.setAttribute("stroke-width", "4");
            tooltip.style.borderTopColor = stroke;
        }

        function resetPolygon(poly) { if (poly) { poly.setAttribute("fill", "transparent"); poly.setAttribute("stroke", "transparent"); } }

        function renderPlots(plots) {
            svgOverlay.innerHTML = '';
            svgOverlay.setAttribute('viewBox', `0 0 ${mapImg.naturalWidth} ${mapImg.naturalHeight}`);
            plots.forEach(plot => {
                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                poly.setAttribute("points", plot.coords);
                poly.setAttribute("fill", "transparent");
                poly.id = "poly-" + plot.plot_id;

                poly.onmouseover = () => { if (!isLocked) { highlightPolygon(poly, plot.status); showInfo(plot); } };
                poly.onmouseout = () => { if (!isLocked) { resetPolygon(poly); tooltip.style.display = 'none'; } };
                
                if (IS_ADMIN) {
                    poly.oncontextmenu = (e) => { e.preventDefault(); highlightPolygon(poly, 'editing'); startEdit(plot, e.clientX, e.clientY); };
                    poly.ontouchstart = (e) => { 
                        if (isLocked) return;
                        touchTimer = setTimeout(() => { highlightPolygon(poly, 'editing'); startEdit(plot, e.touches[0].clientX, e.touches[0].clientY); }, 800); 
                    };
                    poly.ontouchend = () => clearTimeout(touchTimer);
                }
                svgOverlay.appendChild(poly);
            });
        }

        function searchPlot() {
            const id = document.getElementById('plot-search').value.trim();
            const match = lastFetchedPlots.find(p => p.plot_id == id);
            if (match) {
                if (searchTimer) clearTimeout(searchTimer);
                const poly = document.getElementById("poly-" + id);
                highlightPolygon(poly, match.status); showInfo(match);
                mapArea.scrollIntoView({ behavior: 'smooth' });
                searchTimer = setTimeout(() => { if (!isLocked) closeTooltip(); }, 10000);
            } else alert("Plot ID not found");
        }

        function showInfo(data) {
            tooltip.style.pointerEvents = 'none';
            const s = data.status.trim().toLowerCase();
            let statusColor = "var(--vacant)";
            if (s === 'registry done') statusColor = "var(--registry)";
            else if (s === 'booked') statusColor = "var(--booked)";

            let content = `
                <span class="t-label">Plot ID</span><span class="t-value" style="color:var(--gold);">#${data.plot_id}</span>
                <span class="t-label">Size</span><span class="t-value">${data.size}</span>
                <span class="t-label">Status</span><span class="t-value" style="color:${statusColor}">${data.status}</span>
                <span class="t-label">Customer Name</span><span class="t-value">${data.owner || 'N/A'}</span>
            `;

            if (s === 'booked' || s === 'registry done') {
                content += `
                    <span class="t-label">Number</span><span class="t-value">${data.customer_number || 'N/A'}</span>
                    <span class="t-label">Booking Date</span><span class="t-value">${data.booking_date || 'N/A'}</span>
                `;
            }
            if (s === 'registry done') {
                content += `<span class="t-label">Registry Date</span><span class="t-value">${data.registry_date || 'N/A'}</span>`;
            }

            document.getElementById('tooltip-content').innerHTML = content;
            tooltip.style.display = 'block';
        }

        function startEdit(data, x, y) {
            isLocked = true; if (searchTimer) clearTimeout(searchTimer);
            currentPlotData = data; tooltip.style.pointerEvents = 'auto';
            if (window.innerWidth < 600) { tooltip.style.left = "7.5%"; tooltip.style.top = "10%"; }
            else { tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px'; }
            
            document.getElementById('tooltip-content').innerHTML = `
                <strong>Edit Plot #${data.plot_id}</strong>
                <span class="t-label">Size</span><input type="text" id="edit-size" value="${data.size}" class="edit-input">
                <span class="t-label">Status</span>
                <select id="edit-status" class="edit-input">
                    <option value="Registry done" ${data.status === 'Registry done' ? 'selected' : ''}>Registry done</option>
                    <option value="Booked" ${data.status === 'Booked' ? 'selected' : ''}>Booked</option>
                    <option value="Vacant" ${data.status === 'Vacant' ? 'selected' : ''}>Vacant</option>
                </select>
                <span class="t-label">Customer Name</span><input type="text" id="edit-owner" value="${data.owner}" class="edit-input">
                <span class="t-label">Number</span><input type="text" id="edit-num" value="${data.customer_number || ''}" class="edit-input">
                <span class="t-label">Booking Date</span><input type="date" id="edit-book-date" value="${data.booking_date || ''}" class="edit-input">
                <span class="t-label">Registry Date</span><input type="date" id="edit-reg-date" value="${data.registry_date || ''}" class="edit-input">
                <button class="btn-save" onclick="saveDetails()">Save Changes</button>
            `;
            tooltip.style.display = 'block';
        }

        function saveDetails() {
            const body = {
                city: citySel.value, project: projSel.value, plot_id: currentPlotData.plot_id,
                size: document.getElementById('edit-size').value, status: document.getElementById('edit-status').value,
                owner: document.getElementById('edit-owner').value, customer_number: document.getElementById('edit-num').value,
                booking_date: document.getElementById('edit-book-date').value,
                registry_date: document.getElementById('edit-reg-date').value
            };
            fetch('/save_plot_details', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(res => res.json()).then(res => { if(res.success) { isLocked = false; closeTooltip(); loadMap(); } });
        }

        function closeTooltip() { isLocked = false; if (searchTimer) clearTimeout(searchTimer); if (activePoly) resetPolygon(activePoly); tooltip.style.display = 'none'; }
        
        document.addEventListener('mousemove', (e) => { if (!isLocked && window.innerWidth > 600) { tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px'; } });
    </script>
</body>
</html>
