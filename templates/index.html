<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Locator - Dynamic Hover</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f8f9fa; text-align: center; }
        
        .map-wrapper { position: relative; display: inline-block; transition: filter 0.3s ease; }
        
        /* This class is added via JS when hovering over a plot */
        .dimmed img { filter: grayscale(100%) brightness(50%); }

        .map-container { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        img { display: block; width: 100%; height: auto; transition: all 0.3s ease; }

        /* Floating Hover Box (Tooltip) */
        #tooltip {
            position: fixed;
            display: none;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            pointer-events: none; /* Allows mouse to "pass through" to the map */
            z-index: 9999;
            width: 180px;
            text-align: left;
            border-left: 4px solid #3498db;
        }

        .t-label { font-size: 0.7rem; color: #95a5a6; text-transform: uppercase; font-weight: bold; }
        .t-value { font-size: 0.95rem; color: #2c3e50; margin-bottom: 5px; display: block; }
        .status-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Hover Over Plots</h2>

    <div class="map-wrapper" id="map-wrapper">
        <div class="map-container">
            <img src="{{ url_for('static', filename='map.png') }}" usemap="#image-map" id="main-map">
            <map name="image-map">
                <area shape="rect" coords="296,260,329,243" 
                      onmouseover="handleHover(true, '38')" 
                      onmouseout="handleHover(false)" href="javascript:void(0)">
                
                <area shape="rect" coords="297,262,331,278" 
                      onmouseover="handleHover(true, '39')" 
                      onmouseout="handleHover(false)" href="javascript:void(0)">
            </map>
        </div>
    </div>

    <div id="tooltip">
        <div id="tooltip-content"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        imageMapResize();

        const tooltip = document.getElementById('tooltip');
        const wrapper = document.getElementById('map-wrapper');

        // Track mouse to move the tooltip
        document.addEventListener('mousemove', function(e) {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        });

        function handleHover(isEntering, id) {
            if (isEntering) {
                // Dim the rest of the map
                wrapper.classList.add('dimmed');
                
                // Fetch dynamic data
                fetch(`/get_plot_details?id=${id}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) return;

                        const statusColor = data.status.toLowerCase().includes('avail') ? '#27ae60' : '#e74c3c';
                        
                        document.getElementById('tooltip-content').innerHTML = `
                            <span class="t-label">Plot ID</span>
                            <span class="t-value">#${data.plot_id}</span>
                            <span class="t-label">Size</span>
                            <span class="t-value">${data.size}</span>
                            <span class="t-label">Status</span>
                            <span class="t-value"><span class="status-tag" style="background:${statusColor}">${data.status}</span></span>
                            <span class="t-label">Owner</span>
                            <span class="t-value">${data.owner}</span>
                        `;
                        tooltip.style.display = 'block';
                    });
            } else {
                // Reset map and hide tooltip
                wrapper.classList.remove('dimmed');
                tooltip.style.display = 'none';
            }
        }
    </script>
</body>
</html>
