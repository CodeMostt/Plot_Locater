<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Techunited - Plot Locator</title>
    <style>
        :root { 
            --gold: #D4AF37; --registry: #2ecc71; --booked: #f1c40f; 
            --vacant: #e74c3c; --edit: #3498db; --bg: #f4f7f6; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        
        /* Admin Bar */
        .admin-bar { text-align: right; padding-bottom: 10px; font-size: 0.8rem; }
        .admin-btn { background: none; border: 1px solid #ccc; cursor: pointer; padding: 4px 10px; border-radius: 4px; }
        
        .header h1 { color: #2c3e50; font-size: 1.6rem; margin-bottom: 20px; }

        /* Controls */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; }
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 600px; flex-wrap: wrap; }
        select, input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; max-width: 200px; outline: none; }
        .btn-search { background: var(--gold); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Map UI */
        .map-section { display: none; margin: 0 auto; max-width: 1200px; border: 3px solid var(--gold); border-radius: 12px; position: relative; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #map-image { width: 100%; height: auto; display: block; }
        #svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        polygon { pointer-events: auto; cursor: pointer; transition: 0.2s; }

        /* Tooltip & Edit Box */
        #tooltip { 
            position: fixed; display: none; background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); z-index: 10000; width: 260px; text-align: left; 
            border-top: 6px solid var(--gold); pointer-events: auto; 
        }
        .t-label { font-size: 0.65rem; color: #95a5a6; text-transform: uppercase; font-weight: bold; display: block; margin-top: 8px; }
        .t-value { font-size: 0.95rem; color: #2c3e50; font-weight: 600; display: block; }
        .edit-input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
        .btn-edit-inline { margin-top:15px; width:100%; padding:8px; background:var(--edit); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }

        /* Summary Bar */
        .summary-bar { display: none; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .summary-card { background: white; padding: 10px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid #ddd; min-width: 100px; }
        .summary-card.total { border-color: var(--gold); }
        .summary-card.reg { border-color: var(--registry); }
        .summary-card.book { border-color: var(--booked); }
        .summary-card.vacant { border-color: var(--vacant); }
        .s-count { font-size: 1.4rem; font-weight: bold; display: block; color: #2c3e50; }
        .s-label { font-size: 0.7rem; text-transform: uppercase; color: #95a5a6; font-weight: bold; }

        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 0.8rem; }
        .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="admin-bar">
        {% if is_admin %} <span style="color:var(--registry); font-weight:bold;">● Admin Mode Active</span> | <a href="/logout" style="color:red; text-decoration:none;">Logout</a>
        {% else %} <button class="admin-btn" onclick="showLoginPrompt()">Admin Login</button> {% endif %}
    </div>

    <div class="header"><h1>Techunited Plot Locator</h1></div>

    <div class="controls">
        <div class="row">
            <select id="city-select" onchange="updateProjects()">
                <option value="">Select City</option>
                {% for city in cities %}<option value="{{ city }}">{{ city }}</option>{% endfor %}
            </select>
            <select id="project-select" onchange="loadMap()" disabled></select>
        </div>
        <div class="row" id="search-area" style="display:none;">
            <input type="text" id="plot-search" placeholder="Enter Plot ID (e.g. 1)">
            <button class="btn-search" onclick="searchPlot()">Find Plot</button>
        </div>
    </div>

    <div id="map-area" class="map-section">
        <div style="position:relative;">
            <img id="map-image" src="">
            <svg id="svg-overlay"></svg>
        </div>
    </div>

    <div class="summary-bar" id="summary-bar">
        <div class="summary-card total"><span class="s-count" id="count-total">0</span><span class="s-label">Total</span></div>
        <div class="summary-card reg"><span class="s-count" id="count-reg">0</span><span class="s-label">Registry Done</span></div>
        <div class="summary-card book"><span class="s-count" id="count-book">0</span><span class="s-label">Booked</span></div>
        <div class="summary-card vacant"><span class="s-count" id="count-vacant">0</span><span class="s-label">Vacant</span></div>
    </div>

    <div class="legend" id="map-legend" style="display:none;">
        <span><div class="dot" style="background:var(--registry)"></div> Registry done</span>
        <span><div class="dot" style="background:var(--booked)"></div> Booked</span>
        <span><div class="dot" style="background:var(--vacant)"></div> Vacant</span>
    </div>

    <div id="tooltip"><div id="tooltip-content"></div></div>

    <script>
        const IS_ADMIN = "{{ 'true' if is_admin else 'false' }}" === "true";
        const citySel = document.getElementById('city-select'), projSel = document.getElementById('project-select');
        const mapImg = document.getElementById('map-image'), svgOverlay = document.getElementById('svg-overlay');
        const tooltip = document.getElementById('tooltip');
        
        let isLocked = false, currentPlotData = null, activePoly = null, lastFetchedPlots = [], hideTimer;

        function showLoginPrompt() {
            const user = prompt("Admin Username:"), pass = prompt("Admin Password:");
            if (user && pass) {
                fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: user, password: pass}) })
                .then(res => res.json()).then(data => { if(data.success) location.reload(); else alert("Denied"); });
            }
        }

        function updateProjects() {
            fetch(`/get_projects?city=${citySel.value}`).then(res => res.json()).then(projects => {
                projSel.innerHTML = '<option value="">Select Project</option>';
                projects.forEach(p => { 
                    let opt = document.createElement('option'); 
                    opt.value = p; opt.innerHTML = p.replace(/_/g, ' ').toUpperCase(); 
                    projSel.appendChild(opt); 
                });
                projSel.disabled = false;
            });
        }

        function updateSummary(plots) {
            let total = plots.length;
            let reg = plots.filter(p => p.status.toLowerCase().includes('reg')).length;
            let book = plots.filter(p => p.status.toLowerCase().includes('book')).length;
            let vacant = total - (reg + book);
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-reg').innerText = reg;
            document.getElementById('count-book').innerText = book;
            document.getElementById('count-vacant').innerText = vacant;
            document.getElementById('summary-bar').style.display = 'flex';
        }

        function loadMap() {
            mapImg.src = `/static/${citySel.value}/${projSel.value}/map.png`;
            document.getElementById('map-area').style.display = 'block';
            fetch(`/get_all_plots?city=${citySel.value}&project=${projSel.value}`).then(res => res.json()).then(plots => {
                lastFetchedPlots = plots; 
                document.getElementById('search-area').style.display = 'flex'; 
                document.getElementById('map-legend').style.display = 'flex';
                updateSummary(plots);
                mapImg.onload = () => renderPlots(plots);
                if(mapImg.complete) mapImg.onload();
            });
        }

        function highlightPolygon(poly, status) {
            if (activePoly) resetPolygon(activePoly);
            activePoly = poly;
            const s = status.trim().toLowerCase();
            let color, fill;
            if (s.includes('reg')) { color = "#2ecc71"; fill = "rgba(46, 204, 113, 0.4)"; }
            else if (s.includes('book')) { color = "#f1c40f"; fill = "rgba(241, 196, 15, 0.4)"; }
            else if (s === 'editing') { color = "#3498db"; fill = "rgba(52, 152, 219, 0.4)"; }
            else { color = "#e74c3c"; fill = "rgba(231, 76, 60, 0.4)"; }
            poly.setAttribute("fill", fill);
            poly.setAttribute("stroke", color);
            poly.setAttribute("stroke-width", "4");
            tooltip.style.borderTopColor = color;
        }

        function resetPolygon(poly) { if (poly) { poly.setAttribute("fill", "transparent"); poly.setAttribute("stroke", "transparent"); } }

        function renderPlots(plots) {
            svgOverlay.innerHTML = '';
            svgOverlay.setAttribute('viewBox', `0 0 ${mapImg.naturalWidth} ${mapImg.naturalHeight}`);
            plots.forEach(plot => {
                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                poly.setAttribute("points", plot.coords);
                poly.setAttribute("fill", "transparent");
                poly.id = "poly-" + String(plot.plot_id).trim();

                poly.onmouseover = () => { if (!isLocked) { clearTimeout(hideTimer); highlightPolygon(poly, plot.status); showInfo(plot); } };
                poly.onmouseout = () => { if (!isLocked) { hideTimer = setTimeout(() => { if (!tooltip.matches(':hover')) closeTooltip(); }, 300); } };
                if (IS_ADMIN) poly.oncontextmenu = (e) => { e.preventDefault(); highlightPolygon(poly, 'editing'); startEdit(plot, e.clientX, e.clientY); };
                svgOverlay.appendChild(poly);
            });
        }

        tooltip.onmouseenter = () => clearTimeout(hideTimer);
        tooltip.onmouseleave = () => { if (!isLocked) closeTooltip(); };

        function searchPlot() {
            const searchId = document.getElementById('plot-search').value.trim();
            const match = lastFetchedPlots.find(p => String(p.plot_id).trim() === searchId);
            if (match) {
                const poly = document.getElementById("poly-" + String(match.plot_id).trim());
                if (poly) {
                    highlightPolygon(poly, match.status);
                    showInfo(match);
                    poly.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else { alert("Plot ID not found."); }
        }

        function showInfo(data) {
            currentPlotData = data;
            const s = data.status.trim().toLowerCase();
            let statusColor = s.includes('reg') ? "#2ecc71" : s.includes('book') ? "#f1c40f" : "#e74c3c";
            let content = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="t-label">Plot ID</span><span class="t-value" style="color:var(--gold);">#${data.plot_id}</span>
                </div>
                <span class="t-label">Size</span><span class="t-value">${data.size || 'N/A'}</span>
                <span class="t-label">Status</span><span class="t-value" style="color:${statusColor}">${data.status}</span>
                <span class="t-label">Owner</span><span class="t-value">${data.owner || 'N/A'}</span>`;

            if (!s.includes('vac')) {
                content += `<span class="t-label">Number</span><span class="t-value">${data.customer_number || 'N/A'}</span>
                            <span class="t-label">Booking Date</span><span class="t-value">${data.booking_date || 'N/A'}</span>`;
            }
            if (s.includes('reg')) {
                content += `<span class="t-label">Registry Date</span><span class="t-value">${data.registry_date || 'N/A'}</span>`;
            }
            if (IS_ADMIN) content += `<button class="btn-edit-inline" onclick="triggerEditFromHover()">Edit Plot</button>`;
            document.getElementById('tooltip-content').innerHTML = content;
            tooltip.style.display = 'block';
        }

        function triggerEditFromHover() { const rect = tooltip.getBoundingClientRect(); startEdit(currentPlotData, rect.left, rect.top); }

        function startEdit(data, x, y) {
            isLocked = true; currentPlotData = data;
            tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
            document.getElementById('tooltip-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <strong>Edit Plot #${data.plot_id}</strong>
                    <button onclick="closeTooltip()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#999;">&times;</button>
                </div>
                <span class="t-label">Size</span><input type="text" id="edit-size" value="${data.size}" class="edit-input">
                <span class="t-label">Status</span>
                <select id="edit-status" class="edit-input">
                    <option value="Registry done" ${data.status.includes('Reg') ? 'selected' : ''}>Registry done</option>
                    <option value="Booked" ${data.status.includes('Book') ? 'selected' : ''}>Booked</option>
                    <option value="Vacant" ${data.status.includes('Vac') ? 'selected' : ''}>Vacant</option>
                </select>
                <span class="t-label">Owner Name</span><input type="text" id="edit-owner" value="${data.owner}" class="edit-input">
                <span class="t-label">Number</span><input type="text" id="edit-num" value="${data.customer_number || ''}" class="edit-input">
                <span class="t-label">Booking Date</span><input type="date" id="edit-book-date" value="${data.booking_date || ''}" class="edit-input">
                <span class="t-label">Registry Date</span><input type="date" id="edit-reg-date" value="${data.registry_date || ''}" class="edit-input">
                <button class="btn-save" onclick="saveDetails()">Save Changes</button>
                <button onclick="closeTooltip()" style="margin-top:8px; width:100%; padding:10px; background:#f1f1f1; border:none; border-radius:6px; cursor:pointer;">Cancel</button>`;
        }

        function saveDetails() {
            const body = {
                city: citySel.value, project: projSel.value, plot_id: currentPlotData.plot_id,
                size: document.getElementById('edit-size').value, status: document.getElementById('edit-status').value,
                owner: document.getElementById('edit-owner').value, customer_number: document.getElementById('edit-num').value,
                booking_date: document.getElementById('edit-book-date').value, registry_date: document.getElementById('edit-reg-date').value
            };
            fetch('/save_plot_details', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(res => res.json()).then(res => { if(res.success) { isLocked = false; closeTooltip(); loadMap(); } });
        }

        function closeTooltip() { isLocked = false; if (activePoly) resetPolygon(activePoly); tooltip.style.display = 'none'; }
        
        document.addEventListener('mousemove', (e) => { 
            if (!isLocked && !tooltip.matches(':hover')) { tooltip.style.left = (e.clientX + 15) + 'px'; tooltip.style.top = (e.clientY + 15) + 'px'; } 
        });
    </script>
</body>
</html>
