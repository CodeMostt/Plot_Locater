<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Locator - Golden Theme</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; margin: 0; padding: 20px; }
        
        .container { position: relative; display: inline-block; margin: auto; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        img { display: block; width: 100%; height: auto; }

        /* The Golden Boundary Highlight */
        #highlight-box {
            position: absolute;
            display: none;
            border: 2px solid #D4AF37; /* Golden boundary */
            background: rgba(212, 175, 55, 0.15); /* Faint golden tint */
            pointer-events: none; 
            z-index: 10;
            box-sizing: border-box;
        }

        /* Smart Tooltip: Golden Accent */
        #tooltip {
            position: fixed;
            display: none;
            background: white;
            padding: 8px 10px;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 10000;
            min-width: 100px;
            max-width: 160px;
            text-align: left;
            border-top: 4px solid #D4AF37; /* Golden top border */
            word-wrap: break-word; 
            overflow-wrap: break-word;
        }

        .t-label { font-size: 0.65rem; color: #95a5a6; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 1px; }
        .t-value { font-size: 0.85rem; color: #2c3e50; margin-bottom: 6px; display: block; line-height: 1.2; font-weight: 500; }
        
        .t-value:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

    <h2 style="color: #444;">Interactive Plot Map</h2>

    <div class="container" id="map-container">
        <img id="map-image" src="{{ url_for('static', filename='map.png') }}" usemap="#plot-map">
        <div id="highlight-box"></div>

        <map name="plot-map">
            <area shape="rect" coords="296,260,329,243" onmouseover="handleHover(this, '38')" onmouseout="hideHover()" href="javascript:void(0)">
            <area shape="rect" coords="297,262,331,278" onmouseover="handleHover(this, '39')" onmouseout="hideHover()" href="javascript:void(0)">
            <area shape="rect" coords="294,281,333,296" onmouseover="handleHover(this, '40')" onmouseout="hideHover()" href="javascript:void(0)">
            <area shape="rect" coords="294,293,329,312" onmouseover="handleHover(this, '41')" onmouseout="hideHover()" href="javascript:void(0)">
            <area shape="rect" coords="293,328,330,315" onmouseover="handleHover(this, '42')" onmouseout="hideHover()" href="javascript:void(0)">
        </map>
    </div>

    <div id="tooltip">
        <div id="tooltip-content"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        imageMapResize();

        const highlight = document.getElementById('highlight-box');
        const tooltip = document.getElementById('tooltip');

        document.addEventListener('mousemove', (e) => {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
        });

        function handleHover(area, id) {
            const coords = area.coords.split(',').map(Number);
            highlight.style.left = coords[0] + 'px';
            highlight.style.top = coords[1] + 'px';
            highlight.style.width = (coords[2] - coords[0]) + 'px';
            highlight.style.height = (coords[3] - coords[1]) + 'px';
            highlight.style.display = 'block';

            fetch(`/get_plot_details?id=${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) return;
                    
                    document.getElementById('tooltip-content').innerHTML = `
                        <span class="t-label">Plot ID</span>
                        <span class="t-value" style="color:#D4AF37;">#${data.plot_id}</span>
                        <span class="t-label">Dimensions</span>
                        <span class="t-value">${data.size}</span>
                        <span class="t-label">Status</span>
                        <span class="t-value">${data.status}</span>
                        <span class="t-label">Owner Name</span>
                        <span class="t-value">${data.owner}</span>
                    `;
                    tooltip.style.display = 'block';
                });
        }

        function hideHover() {
            highlight.style.display = 'none';
            tooltip.style.display = 'none';
        }
    </script>
</body>
</html>
